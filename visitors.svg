<svg width="260" height="44" viewBox="0 0 260 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated visitors label</title>
  <desc id="desc">A monochrome animated visitors label.</desc>
  <style>
    .box {
      fill: #000000;
      stroke: #ffffff;
      stroke-opacity: 0.34;
      animation: pulse 2.2s ease-in-out infinite;
    }
    .text {
      fill: #ffffff;
      font: 800 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
    }
    .dot {
      fill: #ffffff;
      animation: blink 1.1s steps(1, end) infinite;
    }
    .scan {
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 10 16;
      animation: move 2s linear infinite;
      opacity: 0.32;
    }
    @keyframes pulse {
      0%, 100% { stroke-opacity: 0.24; }
      50% { stroke-opacity: 0.9; }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes move {
      to { stroke-dashoffset: -52; }
    }
  </style>
  <rect x="2" y="2" width="256" height="40" rx="8" class="box"/>
  <path d="M18 33H242" class="scan"/>
  <text x="114" y="27" text-anchor="middle" class="text">VISITORS</text>
  <circle cx="196" cy="22" r="4" class="dot"/>
</svg>
