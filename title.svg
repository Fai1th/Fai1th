<svg width="720" height="110" viewBox="0 0 720 110" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Fai1th.exe title</title>
  <desc id="desc">A monochrome animated terminal title reading Fai1th.exe with a blinking cursor.</desc>
  <style>
    .bg { fill: #000000; }
    .text {
      fill: #ffffff;
      font: 800 58px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.28));
    }
    .sub {
      fill: #a8a8a8;
      font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
    }
    .scan { stroke: #ffffff; stroke-opacity: 0.18; stroke-width: 2; }
    .cursor {
      fill: #ffffff;
      animation: blink 1s steps(1, end) infinite;
    }
    .pulse {
      animation: pulse 2.8s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="720" height="110" rx="12"/>
  <path class="scan" d="M40 84H680"/>
  <g class="pulse">
    <text x="360" y="65" text-anchor="middle" class="text">Fai1th.exe</text>
  </g>
  <rect x="568" y="24" width="26" height="54" rx="2" class="cursor"/>
  <text x="360" y="96" text-anchor="middle" class="sub">chmod +x ./becoming</text>
</svg>
